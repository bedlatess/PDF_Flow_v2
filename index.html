<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Privacy-first PDF tools - Merge, Split, Compress, Convert PDFs locally in your browser" />
    <meta name="theme-color" content="#3b82f6" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <title>PDF-Flow - Privacy-First PDF Tools</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      ;(() => {
        if (!('serviceWorker' in navigator)) {
          return
        }

        const cleanupKey = 'pdf-flow:sw-cleanup-v1'

        const clearCachedAssets = async () => {
          const registrations = await navigator.serviceWorker.getRegistrations()
          let hadPdfFlowWorker = false

          await Promise.all(
            registrations.map(async (registration) => {
              const scriptUrl = registration.active?.scriptURL
                || registration.waiting?.scriptURL
                || registration.installing?.scriptURL
                || ''

              if (scriptUrl.includes('/sw.js')) {
                hadPdfFlowWorker = true
                await registration.unregister()
              }
            }),
          )

          if ('caches' in window) {
            const cacheKeys = await caches.keys()
            await Promise.all(
              cacheKeys
                .filter((key) => key.startsWith('pdf-flow-'))
                .map((key) => caches.delete(key)),
            )
          }

          if (hadPdfFlowWorker && sessionStorage.getItem(cleanupKey) !== '1') {
            sessionStorage.setItem(cleanupKey, '1')
            window.location.reload()
            return
          }

          sessionStorage.removeItem(cleanupKey)
        }

        clearCachedAssets().catch((error) => {
          console.warn('PDF-Flow cache cleanup skipped', error)
        })
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
