version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pdfflow_db
    environment:
      POSTGRES_USER: pdfflow
      POSTGRES_PASSWORD: pdfflow_dev_password
      POSTGRES_DB: pdfflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: pdfflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfflow_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - DATABASE_URL=postgresql://pdfflow:pdfflow_dev_password@db:5432/pdfflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production-min-32-chars
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:3000
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:5174}
      - OAUTH_REDIRECT_URL=${OAUTH_REDIRECT_URL:-http://localhost:8000}
      - PAYMENT_ENABLED_PROVIDERS=${PAYMENT_ENABLED_PROVIDERS:-stripe}
      - PAYMENT_PROVIDER_ORDER=${PAYMENT_PROVIDER_ORDER:-stripe,paypal,epay,alipay,wechat,tokenpay,bepusdt,epusdt,okpay}
      - PAYMENT_PROVIDER_CHECKOUT_URLS=${PAYMENT_PROVIDER_CHECKOUT_URLS:-{}}
      - PAYMENT_GATEWAY_CONFIGS=${PAYMENT_GATEWAY_CONFIGS:-{}}
      - PAYMENT_ORDER_TTL_MINUTES=${PAYMENT_ORDER_TTL_MINUTES:-30}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY:-}
      - STRIPE_PRICE_ID_YEARLY=${STRIPE_PRICE_ID_YEARLY:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - PAYPAL_API_BASE_URL=${PAYPAL_API_BASE_URL:-https://api-m.sandbox.paypal.com}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_GATEWAY_URL=${ALIPAY_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - WECHAT_PAY_APP_ID=${WECHAT_PAY_APP_ID:-}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID:-}
      - WECHAT_PAY_SERIAL_NO=${WECHAT_PAY_SERIAL_NO:-}
      - WECHAT_PAY_PRIVATE_KEY=${WECHAT_PAY_PRIVATE_KEY:-}
      - WECHAT_PAY_API_V3_KEY=${WECHAT_PAY_API_V3_KEY:-}
      - WECHAT_PAY_PLATFORM_CERT=${WECHAT_PAY_PLATFORM_CERT:-}
      - WECHAT_PAY_API_BASE_URL=${WECHAT_PAY_API_BASE_URL:-https://api.mch.weixin.qq.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-PDF-Flow <noreply@pdf-flow.com>}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - /tmp/pdf-flow:/tmp/pdf-flow
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker for async processing
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfflow_celery_worker
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://pdfflow:pdfflow_dev_password@db:5432/pdfflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production-min-32-chars
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
      - PAYMENT_ENABLED_PROVIDERS=${PAYMENT_ENABLED_PROVIDERS:-stripe}
      - PAYMENT_PROVIDER_ORDER=${PAYMENT_PROVIDER_ORDER:-stripe,paypal,epay,alipay,wechat,tokenpay,bepusdt,epusdt,okpay}
      - PAYMENT_PROVIDER_CHECKOUT_URLS=${PAYMENT_PROVIDER_CHECKOUT_URLS:-{}}
      - PAYMENT_GATEWAY_CONFIGS=${PAYMENT_GATEWAY_CONFIGS:-{}}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - PAYPAL_API_BASE_URL=${PAYPAL_API_BASE_URL:-https://api-m.sandbox.paypal.com}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_GATEWAY_URL=${ALIPAY_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - WECHAT_PAY_APP_ID=${WECHAT_PAY_APP_ID:-}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID:-}
      - WECHAT_PAY_SERIAL_NO=${WECHAT_PAY_SERIAL_NO:-}
      - WECHAT_PAY_PRIVATE_KEY=${WECHAT_PAY_PRIVATE_KEY:-}
      - WECHAT_PAY_API_V3_KEY=${WECHAT_PAY_API_V3_KEY:-}
      - WECHAT_PAY_PLATFORM_CERT=${WECHAT_PAY_PLATFORM_CERT:-}
      - WECHAT_PAY_API_BASE_URL=${WECHAT_PAY_API_BASE_URL:-https://api.mch.weixin.qq.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app/app
      - /tmp/pdf-flow:/tmp/pdf-flow
    command: celery -A app.celery_worker worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
