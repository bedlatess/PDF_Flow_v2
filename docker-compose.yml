# Docker Compose for local development and testing
# Use this for local development before deploying to K8s

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pdf-flow-postgres
    environment:
      POSTGRES_DB: pdfflow
      POSTGRES_USER: pdfflow_user
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: pdf-flow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-flow-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql://pdfflow_user:change_me_in_production@postgres:5432/pdfflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://pdf.pawn.eu.org,https://pdf.pawn.eu.org
      - FRONTEND_URL=https://pdf.pawn.eu.org
      - OAUTH_REDIRECT_URL=https://pdf.pawn.eu.org
      # Optional: Add your API keys here
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - temp_files:/tmp/pdf-flow
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-flow-celery-worker
    environment:
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql://pdfflow_user:change_me_in_production@postgres:5432/pdfflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - temp_files:/tmp/pdf-flow
    command: celery -A app.celery_worker worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_worker inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (optional - can be run separately with npm)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdf-flow-frontend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
  temp_files:

networks:
  default:
    name: pdf-flow-network
