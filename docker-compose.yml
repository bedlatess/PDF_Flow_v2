# Docker Compose for local development and testing
# Use this for local development before deploying to K8s

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pdf-flow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdfflow}
      POSTGRES_USER: ${POSTGRES_USER:-pdfflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: pdf-flow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-flow-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://pdfflow_user:change_me_in_production@postgres:5432/pdfflow}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL:-http://localhost:5174}
      - OAUTH_REDIRECT_URL=${OAUTH_REDIRECT_URL:-http://localhost:8000}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
      - PAYMENT_ENABLED_PROVIDERS=${PAYMENT_ENABLED_PROVIDERS:-stripe}
      - PAYMENT_PROVIDER_ORDER=${PAYMENT_PROVIDER_ORDER:-stripe,paypal,epay,alipay,wechat,tokenpay,bepusdt,epusdt,okpay}
      - PAYMENT_PROVIDER_CHECKOUT_URLS=${PAYMENT_PROVIDER_CHECKOUT_URLS:-{}}
      - PAYMENT_GATEWAY_CONFIGS=${PAYMENT_GATEWAY_CONFIGS:-{}}
      - PAYMENT_ORDER_TTL_MINUTES=${PAYMENT_ORDER_TTL_MINUTES:-30}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-PDF-Flow <noreply@pdf-flow.com>}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY:-}
      - STRIPE_PRICE_ID_YEARLY=${STRIPE_PRICE_ID_YEARLY:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - PAYPAL_API_BASE_URL=${PAYPAL_API_BASE_URL:-https://api-m.sandbox.paypal.com}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_GATEWAY_URL=${ALIPAY_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - WECHAT_PAY_APP_ID=${WECHAT_PAY_APP_ID:-}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID:-}
      - WECHAT_PAY_SERIAL_NO=${WECHAT_PAY_SERIAL_NO:-}
      - WECHAT_PAY_PRIVATE_KEY=${WECHAT_PAY_PRIVATE_KEY:-}
      - WECHAT_PAY_API_V3_KEY=${WECHAT_PAY_API_V3_KEY:-}
      - WECHAT_PAY_PLATFORM_CERT=${WECHAT_PAY_PLATFORM_CERT:-}
      - WECHAT_PAY_API_BASE_URL=${WECHAT_PAY_API_BASE_URL:-https://api.mch.weixin.qq.com}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - temp_files:/tmp/pdf-flow
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-flow-celery-worker
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://pdfflow_user:change_me_in_production@postgres:5432/pdfflow}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
      - PAYMENT_ENABLED_PROVIDERS=${PAYMENT_ENABLED_PROVIDERS:-stripe}
      - PAYMENT_PROVIDER_ORDER=${PAYMENT_PROVIDER_ORDER:-stripe,paypal,epay,alipay,wechat,tokenpay,bepusdt,epusdt,okpay}
      - PAYMENT_PROVIDER_CHECKOUT_URLS=${PAYMENT_PROVIDER_CHECKOUT_URLS:-{}}
      - PAYMENT_GATEWAY_CONFIGS=${PAYMENT_GATEWAY_CONFIGS:-{}}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - PAYPAL_API_BASE_URL=${PAYPAL_API_BASE_URL:-https://api-m.sandbox.paypal.com}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_GATEWAY_URL=${ALIPAY_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - WECHAT_PAY_APP_ID=${WECHAT_PAY_APP_ID:-}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID:-}
      - WECHAT_PAY_SERIAL_NO=${WECHAT_PAY_SERIAL_NO:-}
      - WECHAT_PAY_PRIVATE_KEY=${WECHAT_PAY_PRIVATE_KEY:-}
      - WECHAT_PAY_API_V3_KEY=${WECHAT_PAY_API_V3_KEY:-}
      - WECHAT_PAY_PLATFORM_CERT=${WECHAT_PAY_PLATFORM_CERT:-}
      - WECHAT_PAY_API_BASE_URL=${WECHAT_PAY_API_BASE_URL:-https://api.mch.weixin.qq.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - temp_files:/tmp/pdf-flow
    command: celery -A app.celery_worker worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_worker inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (optional - can be run separately with npm)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdf-flow-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
      - "5174:8080"
    environment:
      - PUBLIC_FRONTEND_HOST=${PUBLIC_FRONTEND_HOST:-localhost}
      - ADMIN_FRONTEND_HOST=${ADMIN_FRONTEND_HOST:-admin.localhost}

volumes:
  postgres_data:
  redis_data:
  temp_files:

networks:
  default:
    name: pdf-flow-network
